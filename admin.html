<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no,
viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">

<title>INSTA'VAP ADMIN</title>

<!-- لوجو التطبيق -->
<link rel="apple-touch-icon" href="https://i.ibb.co/k6g95JkP/insta-vape.jpg">
<link rel="icon" type="image/png" href="https://i.ibb.co/k6g95JkP/insta-vape.jpg">

<style>

/* إزالة كل الفراغات */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* ملء الشاشة */
html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

/* الحاوية */
.app{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

/* iframe */
iframe{
    position:absolute;
    top:0;
    left:0;

    width:100%;
    height:100%;

    border:none;
    background:#000;

    overflow:hidden;

    -webkit-overflow-scrolling:touch;

    transform:scale(1);
    transform-origin:top left;
}

/* منع الزوم */
body{
    touch-action:manipulation;
    -webkit-user-select:none;
    user-select:none;
}

/* شاشة تحميل احترافية */
.loader{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:9999;
    transition:0.4s;
}

.loader img{
    width:110px;
    height:110px;
    border-radius:28px;
    object-fit:cover;
    box-shadow:0 0 25px rgba(255,255,255,0.12);
}

.loader h1{
    color:white;
    margin-top:18px;
    font-size:24px;
    letter-spacing:2px;
}

.fade-out{
    opacity:0;
    visibility:hidden;
}

</style>
</head>

<body>

<!-- شاشة البداية -->
<div class="loader" id="loader">
    <img src="https://i.ibb.co/k6g95JkP/insta-vape.jpg">
    <h1>INSTA'VAP</h1>
</div>

<!-- التطبيق -->
<div class="app">

<iframe
src="https://instaapedz.lovable.app/admin"
allowfullscreen
loading="eager">
</iframe>

</div>

<script>

/* إخفاء شاشة التحميل */
window.onload = () => {
    setTimeout(() => {
        document
        .getElementById("loader")
        .classList
        .add("fade-out");
    }, 1800);
};

</script>

</body>
</html>
